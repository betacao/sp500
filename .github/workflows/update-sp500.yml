name: Update S&P 500 Components

on:
  workflow_call:
    secrets:
      SP500_GITHUB_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true
      TELEGRAM_BOT_TOKEN:
        required: true
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SP500_GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update sp500.csv
        run: python update_sp500.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet sp500.csv; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sp500.csv
          git commit -m "update: sp500.csv from Wikipedia $(date +%Y-%m-%d)"
          git push

      - name: Read change summary
        if: steps.changes.outputs.changed == 'true'
        id: summary
        run: |
          {
            echo 'content<<EOF'
            cat CHANGES.txt
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Notify via Telegram
        if: steps.changes.outputs.changed == 'true'
        uses: appleboy/telegram-action@master
        with:
          to:     ${{ secrets.TELEGRAM_CHAT_ID }}
          token:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            🚨 <b>S&amp;P 500 成分股变动</b>

            ${{ steps.summary.outputs.content }}
